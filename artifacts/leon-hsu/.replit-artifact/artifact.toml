kind = "web"
previewPath = "/"
title = "Leon Hsu — Jazz Pianist"
version = "1.0.0"
id = "artifacts/leon-hsu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23518

[services.development]
run = "pnpm --filter @workspace/leon-hsu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leon-hsu", "run", "build" ]
publicDir = "artifacts/leon-hsu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23518"
BASE_PATH = "/"
